# Local environment
spring.datasource.url=jdbc:postgresql://localhost:5432/gymcrm
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.sql.init.mode=always

logging.level.com.gymcrm=DEBUG

# Local actuator exposure (all endpoints accessible)
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always

# JWT secret for local development (min 32 chars for HMAC-SHA-256)
# IMPORTANT: replace with a securely generated random value in any shared/prod environment
jwt.secret=gym-crm-local-dev-jwt-secret-key-keep-at-least-32-chars
jwt.expiration-ms=86400000

# CORS local frontend origins
cors.allowed-origins=http://localhost:3000,http://localhost:4200,http://localhost:8080
