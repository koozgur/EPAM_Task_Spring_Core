# Local environment
spring.datasource.url=jdbc:postgresql://localhost:5432/gymcrm
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.sql.init.mode=always

logging.level.com.gymcrm=DEBUG

# Local actuator exposure (all endpoints accessible)
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always

# JWT secret for local development (min 32 chars for HMAC-SHA-256)
# IMPORTANT: replace with a securely generated random value in any shared/prod environment
jwt.secret=gym-crm-local-dev-jwt-secret-key-keep-at-least-32-chars
jwt.expiration-ms=86400000

# CORS local frontend origins
cors.allowed-origins=http://localhost:3000,http://localhost:4200,http://localhost:8080

# Eureka Service Discovery
# Address of the Eureka server this service registers with and fetches the registry from
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
# Register this service in Eureka so other services can discover it by name
eureka.client.register-with-eureka=true
# Fetch the registry so this service can resolve other services by name (e.g. trainer-workload-service)
eureka.client.fetch-registry=true
# Register with IP address instead of hostname avoids DNS resolution issues locally
eureka.instance.prefer-ip-address=true

# Feign Client
# Activates the fallback= class on @FeignClient when the circuit is open or the call fails
spring.cloud.openfeign.circuitbreaker.enabled=true
# Max ms to wait when establishing a connection to the target service
spring.cloud.openfeign.client.config.default.connect-timeout=2000
# Max ms to wait for a response once the connection is established
spring.cloud.openfeign.client.config.default.read-timeout=5000

# Resilience4j Circuit Breaker, trainer-workload-service
# Evaluate failure rate over the last 10 calls
resilience4j.circuitbreaker.instances.trainer-workload-service.sliding-window-size=10
# Do not open the circuit until at least 5 calls have been recorded
resilience4j.circuitbreaker.instances.trainer-workload-service.minimum-number-of-calls=5
# Open the circuit when 50% or more of the recorded calls have failed
resilience4j.circuitbreaker.instances.trainer-workload-service.failure-rate-threshold=50
# Stay OPEN for 10 seconds before allowing trial calls through (HALF-OPEN)
resilience4j.circuitbreaker.instances.trainer-workload-service.wait-duration-in-open-state=10s
# Allow 3 trial calls in HALF-OPEN state; success closes the circuit, failure re-opens it
resilience4j.circuitbreaker.instances.trainer-workload-service.permitted-number-of-calls-in-half-open-state=3
