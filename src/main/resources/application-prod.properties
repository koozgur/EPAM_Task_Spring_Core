# Production environment
spring.datasource.url=jdbc:postgresql://prod-db:5432/gymcrm
spring.datasource.username=${GYMCRM_DB_USERNAME}
spring.datasource.password=${GYMCRM_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.sql.init.mode=never

# Prod actuator exposure (health only, behind gateway/VPN)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized

logging.level.com.gymcrm=WARN

# GYMCRM_CORS_ORIGINS MUST be set in production; no localhost fallback is intentional
cors.allowed-origins=${GYMCRM_CORS_ORIGINS}

# ActiveMQ, no fallback to catch misconfiguration early
spring.activemq.broker-url=${ACTIVEMQ_BROKER_URL}
spring.activemq.user=${ACTIVEMQ_USER}
spring.activemq.password=${ACTIVEMQ_PASSWORD}
