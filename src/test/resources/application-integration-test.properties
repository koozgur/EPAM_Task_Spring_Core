# ── Integration Test Profile (Main Service) ──────────────────────
# Activated by @ActiveProfiles("integration-test") in SpringIntegrationTestConfig.
# The workload-service JAR is on the test classpath (so we can boot it in-process),
# which means its application.yml is ALSO on the classpath. Several keys below
# explicitly re-assert main-service defaults so workload's YAML cannot bleed into
# the main context. Datasource and broker URL are injected via @DynamicPropertySource.

# Keep the main service identity — workload's application.yml sets
# spring.application.name=trainer-workload-service and would otherwise override.
spring.application.name=gymcrm

# Schema recreated per test run; data.sql seeds training_types (required for
# trainer registration's specializationId 1-4).
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Shared JWT secret — same value is passed to the workload context via
# SpringApplicationBuilder args, enabling cross-service token validation.
jwt.secret=integration-test-jwt-secret-key-min-32-chars-long
jwt.expiration-ms=3600000

# Short lockout so a @negative scenario's failed-login side effect clears quickly.
security.login.max-attempts=3
security.login.lockout-duration-ms=2000

# Eureka — no registry is running during tests. Override all three to defeat
# workload's YAML which sets register/fetch=true.
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# ActiveMQ — vm:// shares a single in-JVM broker between both services.
# @DynamicPropertySource also sets this; listed here as a safe fallback.
spring.activemq.broker-url=vm://localhost?broker.persistent=false&create=true

# Reduce log noise.
logging.level.com.gymcrm=WARN
logging.level.org.springframework.security=WARN
logging.level.org.apache.activemq=WARN
