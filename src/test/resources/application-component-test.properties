# ── Component Test Profile (Main Service) ────────────────────────
# Activated by @ActiveProfiles("component-test") in SpringComponentTestConfig.
# Datasource URL, username, password are injected by Testcontainers via @DynamicPropertySource.

# Schema: recreate on each test run so every suite starts clean
spring.jpa.hibernate.ddl-auto=create-drop

# Seed training types (Cardio, Strength, Yoga, Pilates) from data.sql
spring.sql.init.mode=always

# JWT: fixed secret for deterministic token generation in tests
jwt.secret=test-jwt-secret-key-for-component-tests-min-32-chars
jwt.expiration-ms=3600000

# Brute-force protection: short lockout so scenarios don't block each other
security.login.max-attempts=3
security.login.lockout-duration-ms=2000

# Eureka: disabled — no service registry during tests
eureka.client.enabled=false

# ActiveMQ: in-memory broker (overridden by @DynamicPropertySource, listed here as fallback)
spring.activemq.broker-url=vm://localhost?broker.persistent=false

# Reduce log noise during test runs
logging.level.com.gymcrm=WARN
logging.level.org.springframework.security=WARN
