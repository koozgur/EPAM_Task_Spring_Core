# Staging environment
spring.datasource.url=jdbc:postgresql://stg-db:5432/gymcrm_stg
spring.datasource.username=${GYMCRM_DB_USERNAME}
spring.datasource.password=${GYMCRM_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.sql.init.mode=never

logging.level.com.gymcrm=INFO
