# Development environment
spring.datasource.url=jdbc:postgresql://dev-db:5432/gymcrm_dev
spring.datasource.username=${GYMCRM_DB_USERNAME:postgres}
spring.datasource.password=${GYMCRM_DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.sql.init.mode=never

# Dev actuator exposure (health + prometheus for monitoring)
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=when-authorized

logging.level.com.gymcrm=INFO
