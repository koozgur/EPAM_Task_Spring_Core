# Staging environment
spring.datasource.url=jdbc:postgresql://stg-db:5432/gymcrm_stg
spring.datasource.username=${GYMCRM_DB_USERNAME}
spring.datasource.password=${GYMCRM_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.sql.init.mode=never

# Stg actuator exposure (health + prometheus only, no info for security)
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.show-details=when-authorized

logging.level.com.gymcrm=INFO

# CORS set GYMCRM_CORS_ORIGINS to the staging frontend URL(s) in the deployment environment
cors.allowed-origins=${GYMCRM_CORS_ORIGINS:http://localhost:3000}
