server:
  port: 8081

spring:
  application:
    name: trainer-workload-service
  data:
    mongodb:
      uri: mongodb://localhost:27017/workloaddb
      auto-index-creation: true   # applies @Indexed and @CompoundIndex annotations at startup
  activemq:
    broker-url: tcp://localhost:61616   # default; overridden per profile below

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

jwt:
  secret: gym-crm-local-dev-jwt-secret-key-keep-at-least-32-chars

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.gymcrm.workload: DEBUG

workload:
  jms:
    queue-name: trainer.workload.queue     # must match jms.queue.workload in gym-crm
    dlq-name: DLQ.trainer.workload.queue   # per-destination DLQ via IndividualDeadLetterStrategy
    concurrency: 1-5

---
# Local — connects to the embedded TCP broker started by this service's BrokerService bean.
# Start this service before gym-crm so the broker is ready when the producer connects.
spring:
  config:
    activate:
      on-profile: local
  data:
    mongodb:
      uri: mongodb://localhost:27017/workloaddb
  activemq:
    broker-url: tcp://localhost:61616

---
# Dev — broker URL, credentials, and MongoDB URI supplied via env vars; fallbacks allowed
spring:
  config:
    activate:
      on-profile: dev
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://dev-mongo:27017/workloaddb}
  activemq:
    broker-url: ${ACTIVEMQ_BROKER_URL:tcp://dev-activemq:61616}
    user: ${ACTIVEMQ_USER:admin}
    password: ${ACTIVEMQ_PASSWORD:admin}

---
# Staging — all vars are mandatory; no fallback so misconfiguration fails fast at startup.
spring:
  config:
    activate:
      on-profile: stg
  data:
    mongodb:
      uri: ${MONGODB_URI}
  activemq:
    broker-url: ${ACTIVEMQ_BROKER_URL}
    user: ${ACTIVEMQ_USER}
    password: ${ACTIVEMQ_PASSWORD}

---
# Production — concurrency reduced to 1-3 to stay within broker connection limits.
# All vars are mandatory; no fallback is intentional.
spring:
  config:
    activate:
      on-profile: prod
  data:
    mongodb:
      uri: ${MONGODB_URI}
  activemq:
    broker-url: ${ACTIVEMQ_BROKER_URL}
    user: ${ACTIVEMQ_USER}
    password: ${ACTIVEMQ_PASSWORD}
workload:
  jms:
    concurrency: 1-3
