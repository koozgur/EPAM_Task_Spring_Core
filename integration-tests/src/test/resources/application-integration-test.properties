# ── Integration Test Profile (Main Service) ──────────────────────
# Activated via @ActiveProfiles("integration-test").
# Workload-service is on the test classpath; its application.yml may override
# main-service defaults, so critical properties are redefined here.
# Datasource and broker URL are supplied via @DynamicPropertySource.

# Preserve main service identity (avoid override from workload config).
spring.application.name=gymcrm

# Recreate schema per run; seed required reference data (training_types)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Shared JWT secret for cross-service authentication
jwt.secret=integration-test-jwt-secret-key-min-32-chars-long
jwt.expiration-ms=3600000

# Short lockout window for faster negative test recovery
security.login.max-attempts=3
security.login.lockout-duration-ms=2000

# Disable Eureka (workload config enables it by default)
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# Shared in-JVM ActiveMQ broker (fallback; also set dynamically)
spring.activemq.broker-url=vm://localhost?broker.persistent=false&create=true

# Reduce log noise.
logging.level.com.gymcrm=WARN
logging.level.org.springframework.security=WARN
logging.level.org.apache.activemq=WARN
