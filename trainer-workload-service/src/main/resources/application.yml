server:
  port: 8081

spring:
  application:
    name: trainer-workload-service
  datasource:
    url: jdbc:h2:mem:workloaddb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console
  activemq:
    broker-url: tcp://localhost:61616

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

jwt:
  secret: gym-crm-local-dev-jwt-secret-key-keep-at-least-32-chars

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.gymcrm.workload: DEBUG

workload:
  jms:
    queue-name: trainer.workload.queue          # must match jms.queue.workload in main service
    dlq-name: DLQ.trainer.workload.queue        # per-destination DLQ set by IndividualDeadLetterStrategy
    concurrency: 1-5

# Connects to the embedded TCP broker started by this service's BrokerService bean.
# Start this service before gym-crm so the broker is ready when the producer connects.
spring:
  config:
    activate:
      on-profile: local
  activemq:
    broker-url: tcp://localhost:61616

spring:
  config:
    activate:
      on-profile: dev
  activemq:
    broker-url: ${ACTIVEMQ_BROKER_URL:tcp://dev-activemq:61616}
    user: ${ACTIVEMQ_USER:admin}
    password: ${ACTIVEMQ_PASSWORD:admin}

# All three vars are mandatory; no fallback so misconfiguration fails fast at startup.
spring:
  config:
    activate:
      on-profile: stg
  activemq:
    broker-url: ${ACTIVEMQ_BROKER_URL}
    user: ${ACTIVEMQ_USER}
    password: ${ACTIVEMQ_PASSWORD}

# Concurrency reduced to 1-3 to stay within broker connection limits.
# All ActiveMQ vars are mandatory; no fallback is intentional.
spring:
  config:
    activate:
      on-profile: prod
  activemq:
    broker-url: ${ACTIVEMQ_BROKER_URL}
    user: ${ACTIVEMQ_USER}
    password: ${ACTIVEMQ_PASSWORD}
workload:
  jms:
    concurrency: 1-3
