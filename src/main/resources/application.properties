# Spring Application Properties
spring.application.name=gymcrm

# Default environment
spring.profiles.default=local

# Common JPA defaults (profile files can override)
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# SQL seed scripts
spring.sql.init.encoding=UTF-8

# Actuator observability endpoints (override per profile)
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=when-authorized
management.health.probes.enabled=true
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# App metadata for /actuator/info
management.info.env.enabled=true
info.app.name=GymCRM
info.app.version=3.0.0
info.app.description=Gym Management System - Spring Boot 3 Migration
info.app.encoding=@project.build.sourceEncoding@
info.app.java.version=@java.version@
